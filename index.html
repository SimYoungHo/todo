<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>심플 할 일 목록</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="auth-container" class="container">
        <h1>로그인</h1>
        <div class="input-card">
            <input type="email" id="email-input" placeholder="이메일을 입력하세요">
            <input type="password" id="password-input" placeholder="비밀번호를 입력하세요">
            <div class="controls">
                <button id="login-btn">로그인</button>
                <button id="signup-btn" class="secondary">회원가입</button>
            </div>
        </div>
    </div>

    <main id="todo-container" class="container hidden">
        <div class="header-with-logout">
            <h1>나의 할 일</h1>
            <button id="logout-btn" class="logout-btn">로그아웃</button>
        </div>
        <div class="input-card">
            <input type="text" id="todo-input" placeholder="새로운 할 일을 입력하세요">
            <div class="controls">
                <select id="todo-priority">
                    <option value="high">높음</option>
                    <option value="medium" selected>보통</option>
                    <option value="low">낮음</option>
                </select>
                <button id="add-btn">추가</button>
            </div>
        </div>
        <ul id="todo-list"></ul>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
